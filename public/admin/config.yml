backend:
  name: github
  repo: SyedQem/vesper-labs
  branch: master
  base_url: https://vesper-labs.vercel.app
  auth_endpoint: api/auth

publish_mode: editorial_workflow

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "src/content/blog/posts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string", pattern: ["^[a-z0-9]+(?:-[a-z0-9]+)*$", "Must be lowercase with hyphens only"] }
      - { label: "Publish Date", name: "publishedAt", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Updated Date", name: "updatedAt", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Author", name: "author", widget: "string", default: "Vesper Labs Editorial Team" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - label: "Cover Image"
        name: "coverImage"
        widget: "object"
        fields:
          - { label: "Image", name: "src", widget: "image", default: "/og-image.svg" }
          - { label: "Alt Text", name: "alt", widget: "string" }
      - { label: "Tags", name: "tags", widget: "list", default: ["Engineering"] }
      - label: "SEO"
        name: "seo"
        widget: "object"
        collapsed: true
        fields:
          - { label: "Meta Title", name: "metaTitle", widget: "string" }
          - { label: "Meta Description", name: "metaDescription", widget: "text" }
          - { label: "OG Image", name: "ogImage", widget: "image", default: "/og-image.svg" }
      - { label: "Body", name: "body", widget: "markdown" }
